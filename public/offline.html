<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — TU Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0f14;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
      border-radius: 16px;
      background: #1a1c23;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #19d9b4;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: #a1a1aa;
      font-size: 0.875rem;
      max-width: 320px;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      background: #19d9b4;
      color: #0d0f14;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="icon">TU</div>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Your data will sync when you're back online.</p>
  <button onclick="window.location.reload()">Retry</button>
</body>
</html>
